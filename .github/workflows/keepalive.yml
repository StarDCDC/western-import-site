# Keeps the Render free-tier web service awake so visitors don't hit a 30–60s
# cold start. Render free instances sleep after ~15 min of inactivity; this cron
# pings /api/ping on a schedule to keep it warm during the day.
#
# SETUP: add a repo variable named SITE_URL (Settings → Secrets and variables →
# Actions → Variables) set to your production URL, e.g.
#   https://western-import-site.onrender.com   (or your custom domain)
# If unset, it falls back to the onrender default below.
#
# NOTE: GitHub cron is best-effort (can be delayed several minutes under load).
# For guaranteed no cold starts, upgrade the Render service to a paid plan.
name: keepalive

on:
  schedule:
    - cron: "*/12 * * * *" # every 12 minutes
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/ping
        run: |
          URL="${{ vars.SITE_URL || 'https://western-import-site.onrender.com' }}"
          echo "Pinging $URL/api/ping"
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 60 "$URL/api/ping" || echo "000")
          echo "HTTP $code"
